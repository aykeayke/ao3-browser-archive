<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading Archive</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="header">
    <div class="container">
      <h1>Archive of Emotional Damage</h1>
      <p class="subtitle">A carefully curated list of emotional damage.</p>

    </div>
  </header>

  <section class="stats">
    <div class="container stats-grid">

      <div class="stat">
        <span class="num">0</span>
        <span class="label">Works</span>
      </div>

      <div class="stat">
        <span class="num">0</span>
        <span class="label">Words</span>
      </div>

      <div class="stat">
        <span class="num">0h</span>
        <span class="label">Time lost</span>
      </div>

      <div class="stat">
        <span class="num">—</span>
        <span class="label">Top author</span>
      </div>

    </div>
  </section>

<section class="container charts-section">

  <div class="chart-box">
    <h3>Top Fandoms</h3>
    <canvas id="fandomChart"></canvas>
  </div>

  <div class="chart-box">
    <h3>Ratings Distribution</h3>
    <canvas id="ratingChart"></canvas>
  </div>

  <div class="chart-box">
    <h3>Works by Word Count</h3>
    <canvas id="wordChart"></canvas>
  </div>

</section>

<section class="library-section">

  <div class="library-toolbar">
    <input id="searchInput" placeholder="Search..." oninput="renderLibrary()" />

    <button onclick="exportFics()">Export</button>
    <input type="file" id="importFile" onchange="importFics(event)" hidden />
    <button onclick="document.getElementById('importFile').click()">Import</button>

    <button class="danger" onclick="clearAllFics()">Delete All</button>
  </div>

  <table class="library-table">

    <thead>
      <tr>
        <th onclick="sortBy('title')">Title <span id="sort-title"></span></th>
<th onclick="sortBy('author')">Author <span id="sort-author"></span></th>
<th onclick="sortBy('fandoms')">Fandom(s) <span id="sort-fandoms"></span></th>
<th onclick="sortBy('status')">Status <span id="sort-status"></span></th>
<th onclick="sortBy('rating')">Rating <span id="sort-rating"></span></th>
<th onclick="sortBy('chapters')">Chapters <span id="sort-chapters"></span></th>
<th onclick="sortBy('words')">Words <span id="sort-words"></span></th>
<th onclick="sortBy('kudos')">Kudos <span id="sort-kudos"></span></th>
<th onclick="sortBy('userRating')">Your Rating <span id="sort-userRating"></span>
  <th>Notes</th>
</th>
<th>Delete</th>
      </tr>
    </thead>

    <tbody id="libraryBody"></tbody>

  </table>

</section>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/script.js"></script>

</body>
</html>
